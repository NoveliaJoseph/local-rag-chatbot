<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Local AI PDF Chatbot</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            height: 100vh;
        }

        .chat-container{

            width: 75%;
            height: 94vh;

            margin: auto;
            margin-top: 15px;

            background: white;

            border-radius: 15px;

            display: flex;
            flex-direction: column;

            overflow: hidden;

            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        .chat-header{

            padding: 20px;

            border-bottom: 1px solid #ddd;

            background: white;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title{

            font-size: 24px;
            font-weight: bold;
        }

        .upload-section{

            display: flex;
            gap: 10px;
            align-items: center;
        }

        #pdf-file{
            font-size: 14px;
        }

        .upload-btn{

            padding: 10px 16px;

            border: none;

            background: #111;

            color: white;

            border-radius: 8px;

            cursor: pointer;
        }

        .upload-btn:hover{
            opacity: 0.9;
        }

        .chat-box{

            flex: 1;

            overflow-y: auto;

            padding: 20px;

            background: #fafafa;
        }

        .user-message{

            background: #d1e7ff;

            padding: 14px;

            border-radius: 14px;

            margin-bottom: 15px;

            margin-left: auto;

            max-width: 75%;

            width: fit-content;

            line-height: 1.6;

            word-wrap: break-word;
        }

        .bot-message{

            background: white;

            padding: 16px;

            border-radius: 14px;

            margin-bottom: 20px;

            max-width: 90%;

            line-height: 1.8;

            word-wrap: break-word;

            border: 1px solid #e5e5e5;
        }

        .system-message{

            background: #fff3cd;

            color: #856404;

            padding: 12px;

            border-radius: 10px;

            margin-bottom: 15px;

            border: 1px solid #ffeeba;
        }

        .bot-message h1,
        .bot-message h2,
        .bot-message h3{

            margin-top: 15px;
            margin-bottom: 10px;
        }

        .bot-message p{
            margin-bottom: 12px;
        }

        .bot-message ul,
        .bot-message ol{

            margin-left: 25px;
            margin-bottom: 15px;
        }

        .bot-message li{
            margin-bottom: 8px;
        }

        .bot-message code{

            background: #222;

            color: #00ff88;

            padding: 2px 6px;

            border-radius: 5px;

            font-size: 14px;
        }

        .bot-message pre{

            background: #222;

            color: white;

            padding: 15px;

            border-radius: 10px;

            overflow-x: auto;

            margin-top: 10px;
            margin-bottom: 15px;
        }

        .typing{

            background: white;

            padding: 12px 18px;

            border-radius: 12px;

            width: fit-content;

            margin-bottom: 20px;

            border: 1px solid #ddd;

            color: #555;
        }

        .dots::after{

            content: "";

            animation: dots 1.5s infinite;
        }

        @keyframes dots{

            0%{
                content: "";
            }

            33%{
                content: ".";
            }

            66%{
                content: "..";
            }

            100%{
                content: "...";
            }
        }

        .input-area{

            display: flex;

            padding: 20px;

            border-top: 1px solid #ddd;

            background: white;

            gap: 10px;
        }

        #question{

            flex: 1;

            padding: 15px;

            border-radius: 10px;

            border: 1px solid #ccc;

            font-size: 16px;

            outline: none;
        }

        #question:focus{

            border: 1px solid black;
        }

        #send-btn{

            padding: 15px 25px;

            border: none;

            background: black;

            color: white;

            border-radius: 10px;

            cursor: pointer;

            font-size: 16px;

            transition: 0.2s;
        }

        #send-btn:hover{

            opacity: 0.9;
        }

        #send-btn:disabled{

            opacity: 0.5;

            cursor: not-allowed;
        }

    </style>

</head>

<body>

<div class="chat-container">

    <div class="chat-header">

        <div class="header-title">
            Local AI PDF Chatbot
        </div>

        <div class="upload-section">

            <input
                type="file"
                id="pdf-file"
                accept=".pdf"
            >

            <button
                class="upload-btn"
                onclick="uploadPDF()"
            >
                Upload PDF
            </button>

        </div>

    </div>

    <div class="chat-box" id="chat-box">

        <div class="system-message">
            Upload a PDF and start chatting with your document.
        </div>

    </div>

    <div class="input-area">

        <input
            type="text"
            id="question"
            placeholder="Ask a question..."
            onkeydown="handleEnter(event)"
        >

        <button
            id="send-btn"
            onclick="sendMessage()"
        >
            Send
        </button>

    </div>

</div>

<script>

let isGenerating = false;



async function uploadPDF(){

    let fileInput = document.getElementById("pdf-file");

    let file = fileInput.files[0];

    if(!file){

        alert("Please select a PDF");

        return;
    }

    let formData = new FormData();

    formData.append("pdf", file);

    try{

        let response = await fetch("/upload-pdf/", {

            method: "POST",

            headers: {
                "X-CSRFToken": "{{ csrf_token }}"
            },

            body: formData
        });

        let data = await response.json();

        let chatBox = document.getElementById("chat-box");

        chatBox.innerHTML += `
            <div class="system-message">
                ${data.message}
            </div>
        `;

        scrollToBottom();
    }

    catch(error){

        alert("Failed to upload PDF");

        console.error(error);
    }
}



async function sendMessage(){

    if(isGenerating){
        return;
    }

    let questionInput = document.getElementById("question");

    let question = questionInput.value.trim();

    if(question === ""){
        return;
    }

    let chatBox = document.getElementById("chat-box");

    let sendButton = document.getElementById("send-btn");

    isGenerating = true;

    sendButton.disabled = true;

    // USER MESSAGE

    let userDiv = document.createElement("div");

    userDiv.className = "user-message";

    userDiv.innerText = question;

    chatBox.appendChild(userDiv);

    questionInput.value = "";

    scrollToBottom();

    // TYPING INDICATOR

    let typingDiv = document.createElement("div");

    typingDiv.className = "typing";

    typingDiv.id = "typing";

    typingDiv.innerHTML = `
        <span>AI is typing</span>
        <span class="dots"></span>
    `;

    chatBox.appendChild(typingDiv);

    scrollToBottom();

    let formData = new FormData();

    formData.append("question", question);

    try{

        let response = await fetch("/", {

            method: "POST",

            headers: {
                "X-CSRFToken": "{{ csrf_token }}"
            },

            body: formData
        });

        let data = await response.json();

        removeTypingIndicator();

        let botDiv = document.createElement("div");

        botDiv.className = "bot-message";

        chatBox.appendChild(botDiv);

        await typeEffect(
            botDiv,
            data.answer,
            8
        );

        scrollToBottom();
    }

    catch(error){

        removeTypingIndicator();

        let errorDiv = document.createElement("div");

        errorDiv.className = "bot-message";

        errorDiv.innerHTML = `
            <strong>Error:</strong>
            Failed to generate response.
        `;

        chatBox.appendChild(errorDiv);

        console.error(error);
    }

    finally{

        isGenerating = false;

        sendButton.disabled = false;

        questionInput.focus();

        scrollToBottom();
    }
}



async function typeEffect(element, text, speed = 8){

    let i = 0;

    let currentText = "";

    while(i < text.length){

        currentText += text.charAt(i);

        element.innerText = currentText;

        scrollToBottom();

        i++;

        await sleep(speed);
    }

    element.innerHTML = marked.parse(text);

    scrollToBottom();
}



function removeTypingIndicator(){

    let typing = document.getElementById("typing");

    if(typing){
        typing.remove();
    }
}



function scrollToBottom(){

    let chatBox = document.getElementById("chat-box");

    chatBox.scrollTop = chatBox.scrollHeight;
}



function sleep(ms){

    return new Promise(resolve =>
        setTimeout(resolve, ms)
    );
}



function handleEnter(event){

    if(event.key === "Enter" && !event.shiftKey){

        event.preventDefault();

        sendMessage();
    }
}



window.onload = function(){

    document.getElementById("question").focus();
};

</script>

</body>
</html>
